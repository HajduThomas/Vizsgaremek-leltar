<!DOCTYPE html>
<html lang="hu">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./main.css">
  <link rel="icon" href="./assets/pixelcat.png">
  <script src="jquery-4.0.0.min.js"></script>
  <!--seperated for easy removal-->
  <script src="main.js" defer></script>

  <title>Leltarozo</title>

</head>

<body>

  <div class="slider" id="slider">
    <div class="panel">
      <div class="top fCtr">
        <a id="menu" class="menu">
          <img alt="Logo Here!" src="./assets/pixelcat.png">
        </a>
      </div>
      <div class="sum">

        <div class="catTop fCtr">
          <h2>Tables</h2>
        </div>
        <div id="categories" class="container catCont">
          <!--Categories go here-->
        </div>
      </div>

    </div>
  </div>

  <div class="panel">
    <div class="top fSpc">
      <div class="optSides fCtr">
        <div class="bclr tab fCtr" id="tab">
          <img src="./assets/icons/chevron-compact-right.svg" alt=">">
        </div>
      </div>
      <div class="optMiddle fCtr">
        <h1 id="category">Category name</h1>
      </div>
      <div class="optSides fCtr">
        <div class="bclr tab fCtr">
          <img src="./assets/icons/box-arrow-in-right.svg" alt="Quit">
        </div>
      </div>
    </div>

    <div class="sum sumMain">
      <div id="options" class="options fSpc">
        <div class="optSides fCtr">
          <button class="bclr fCtr"><img src="./assets/icons/square.svg" alt="[]" class="optIcon"></button> <!--nonfuctional-->
          <button class="bclr fCtr"><img src="./assets/icons/arrow-clockwise.svg" alt="O" class="optIcon"></button> <!--nonfuctional-->
          <button class="bclr fCtr"><img src="./assets/icons/three-dots-vertical.svg" alt="X" class="optIcon"></button> <!--nonfuctional-->
        </div>
        <div class="optMiddle fCtr" id="search">
          <input class="sclr" type="text" placeholder="Search..." autocomplete="off">
        </div>
        <div class="optSides fCtr">
          <!--Pagination-->
          <button id="prew" class="bclr fCtr"><img src="./assets/icons/chevron-left.svg" alt="&lt;" class="optIcon"></button>
          <p id="curPg" class="fCtr">2</p>
          <button id="next" class="bclr fCtr"><img src="./assets/icons/chevron-right.svg" alt="&gt;" class="optIcon"></button>
        </div>
      </div>
      <div id="dataTable" class="container mainCont"></div>
      <div id="menu2" class="container mainCont">
        <div class="setOption">
          <label>Hue</label>
          <input type="range" id="hue" min="1" max="360" autocomplete="off">
        </div>
        <div class="setOption">
          <label>Dark mode</label>
          <div class="fCtr">
            <button id="themeL" class="bclr">
              <div style="background-color: aliceblue; width: 32px; height: 32px;"></div>
            </button>
            <button id="themeD" class="bclr">
              <div style="background-color: darkblue; width: 32px; height: 32px;"></div>
            </button>
            <button id="themeA" class="bclr">
              <div style="background-color: black; width: 32px; height: 32px;"></div>
            </button>
          </div>
        </div>
        <div class="setOption">
          <label>fill</label>
          <input type="checkbox" id="fill1">
        </div>
        <div class="setOption">
          <label>fill</label>
          <input type="checkbox" id="fill2">
        </div>
        <div class="setOption">
          <label>fill</label>
          <input type="checkbox" id="fill3">
        </div>
        <div class="setOption">
          <label>fill</label>
          <input type="checkbox" id="fill4">
        </div>
        <div class="setOption">
          <label>fill</label>
          <input type="checkbox" id="fill5">
        </div>
        <div class="setOption">
          <input id="settingSave" type="button" value="Save" class="bclr">
        </div>
      </div>
    </div>
  </div>
  
  <div class="cover"></div>

</body>

</html>
